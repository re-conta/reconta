# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name *.reconta.app reconta.app;
    return 301 https://$host$request_uri;
}

# WWW to non-WWW redirect
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    ssl_certificate         /etc/letsencrypt/live/reconta.app/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/reconta.app/privkey.pem;

    server_name www.reconta.app;
    return 301 https://reconta.app$request_uri;
}

# Main application server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    ssl_certificate         /etc/letsencrypt/live/reconta.app/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/reconta.app/privkey.pem;

    server_name reconta.app;

    # Confia no CF-Connecting-IP do Cloudflare para $remote_addr/X-Real-IP —
    # necessário para o painel de estatísticas registrar o IP real do
    # visitante, não o da borda do Cloudflare.
    include /etc/nginx/sites.d/cloudflare-realip.conf;

    root /var/www/reconta/web/dist;
    index index.html;

    # SSE de notificações — stream de longa duração, sem buffering para os
    # eventos chegarem em tempo real ao navegador
    location = /api/notifications/stream {
        proxy_pass http://localhost:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Go API — proxy reverso para o backend
    location /api/ {
        proxy_pass http://localhost:3020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vue.js SPA — serve arquivos estáticos e fallback para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
